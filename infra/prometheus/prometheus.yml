global:
  scrape_interval: 5s
  scrape_timeout: 3s
  external_labels:
    monitor: 'shop-platform-local'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: catalog-service
    metrics_path: /metrics
    static_configs:
      - targets: ["catalog-service:8081"]

  - job_name: "gateway-service"
    scheme: https
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["gateway-service:8083"]

  
  - job_name: 'auth-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['auth-service:8082']

  - job_name: 'proxy-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['proxy-service:8085']

