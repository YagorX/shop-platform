version: "3.9"

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0


      
  elasticsearch:
    image: elastic/elasticsearch:8.17.10
    container_name: elasticsearch
    ports:
      - "9200:9200"
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - network.host=0.0.0.0
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.routing.allocation.disk.threshold_enabled=false
      - action.destructive_requires_name=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536 # 9200 port is by default

  kibana:
    image: elastic/kibana:8.17.10
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
     - ELASTICSEARCH_HOSTS=http://elasticsearch:9200 # kibana is http://localhost:5601/
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.10
    container_name: logstash
    volumes:
      - ../infra/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - kafka
      - elasticsearch
  
  filebeat:
    image: elastic/filebeat:8.17.10
    container_name: filebeat
    user: root
    restart: unless-stopped
    command: [ "--strict.perms=false", "-e", "-d", "publish" ]
    volumes:
      - ../infra/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    pid: host
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|var/lib/containerd/.+|var/lib/kubelet/.+)($$|/)

  grafana:
    image: grafana/grafana:10.4.19
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "sandbox.smtp.mailtrap.io:587"
      GF_SMTP_USER: "xxx"
      GF_SMTP_PASSWORD: "xxx"
      GF_SMTP_FROM_ADDRESS: ""
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  catalog-service:
    build:
      context: ../../shop-catalog-service
      dockerfile: Dockerfile
    container_name: catalog-service
    ports:
      - "8081:8081"
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      jaeger:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway-service:
    build:
      context: ../../shop-gateway
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      jaeger:
        condition: service_started
      catalog-service:
        condition: service_healthy

  auth-postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5454:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-migrate:
    image: migrate/migrate:4
    container_name: auth-migrate
    depends_on:
      auth-postgres:
        condition: service_healthy
    volumes:
      - ../../shop-auth/sso/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:postgres@auth-postgres:5432/authdb?sslmode=disable",
        "up"
      ]
    restart: "no"

  auth-service:
    build:
      context: ../../shop-auth/sso
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8082:8082"
      - "44044:44044"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      jaeger:
        condition: service_started
      auth-postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10


volumes:
  esdata:
  postgres_data:
  redis_data:
  auth_postgres_data:

